suite: ServiceAccount Template Tests
templates:
  - "charts/plat-eng-cache-package/templates/serviceaccount.yaml"
tests:
  - it: "should render ServiceAccount when create is true"
    asserts:
      - equal:
          path: kind
          value: ServiceAccount

  - it: "should not render ServiceAccount when create is false"
    set:
      plat-eng-cache-package:
        serviceAccount:
          create: false
    asserts:
      - hasDocuments:
          count: 0
