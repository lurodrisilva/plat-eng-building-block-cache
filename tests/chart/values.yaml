plat-eng-cache-package:
  team: "test-team"
  environment: "test"
  serviceAccount:
    create: true
    automount: true
    annotations: {}
    name: ""
  providerConfigRef:
    name: "test-provider"
  writeConnectionSecretToRef:
    namespace: "test-ns"
  caches:
