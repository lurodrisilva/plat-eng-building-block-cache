# nameOverride is an optional override for the chart name used in resource naming.
nameOverride: ""
# fullnameOverride is an optional override for the fully qualified resource name.
fullnameOverride: ""

# commonLabels is a map of additional labels to apply to all resources.
commonLabels: {}
# commonAnnotations is a map of additional annotations for resources.
commonAnnotations: {}

# team is the team identifier for resource ownership tracking.
team: ""
# environment is the deployment environment name (e.g., dev, staging, production).
environment: ""

serviceAccount:
  # create specifies whether a service account should be created.
  create: true
  # automount specifies whether to automatically mount a ServiceAccount's API credentials.
  automount: true
  # annotations is a map of annotations to add to the service account.
  annotations: {}
  # name is the name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template.
  name: ""

# resources is the resource limits and requests for the pod.
resources: {}

# nodeSelector is a map of node selector labels for pod scheduling.
nodeSelector: {}

# tolerations is a list of tolerations for pod scheduling.
tolerations: []

# affinity is the affinity configuration for pod scheduling.
affinity: {}

# providerConfigRef is the reference to the Crossplane ProviderConfig to use.
providerConfigRef:
  name: default

# writeConnectionSecretToRef configures where Crossplane writes connection secrets.
writeConnectionSecretToRef:
  namespace: default

caches:
  redis:
    - name: my-redis
      capacity: 1
      family: "C"
      location: "eastus"
      redisVersion: "6"
      skuName: "Standard"
      resourceGroupName: "my-resource-group"
      minimumTlsVersion: "1.2"
      # publicNetworkAccessEnabled: true
      # nonSslPortEnabled: false
      # redisConfiguration:
      #   maxmemoryPolicy: volatile-lru
      # tags: {}
